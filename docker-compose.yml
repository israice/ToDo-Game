services:
  web:
    container_name: todo-game
    restart: unless-stopped
    build: .
    ports:
      - "${PORT:-5010}:5000"
    volumes:
      - app_data:/app/DATA
      - pip_cache:/root/.cache/pip
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - REPO_URL=${REPO_URL:-https://github.com/israice/ToDo-Game.git}
      - BRANCH=${BRANCH:-master}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DOCKER_API_VERSION=1.44
      # BWS loads secrets at startup (SECRET_KEY, WEBHOOK_SECRET, etc.)
      - BITWARDEN_ENABLED=${BITWARDEN_ENABLED:-0}
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN:-}
      - BWS_PROJECT_ID=${BWS_PROJECT_ID:-}
      - BWS_REQUIRE_WRITE=${BWS_REQUIRE_WRITE:-0}
      - BWS_SECRET_KEY=${BWS_SECRET_KEY:-SECRET_KEY}
      - BWS_WEBHOOK_SECRET=${BWS_WEBHOOK_SECRET:-WEBHOOK_SECRET}
      - BWS_TELEGRAM_BOT_TOKEN=${BWS_TELEGRAM_BOT_TOKEN:-TELEGRAM_BOT_TOKEN}
      - BWS_ADMIN_TELEGRAM_ID=${BWS_ADMIN_TELEGRAM_ID:-ADMIN_TELEGRAM_ID}
      # Instance role (primary = push + incremental sync, replica = polling + full sync)
      - INSTANCE_ROLE=${INSTANCE_ROLE:-primary}
      - APP_URL=${APP_URL:-}
      # Fallback (used only if BWS disabled)
      - SECRET_KEY=${SECRET_KEY:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
    healthcheck:
      test: ["CMD", "curl", "-fsSL", "http://localhost:5000/.well-known/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    entrypoint: ["/bin/sh", "-c", "if [ -z \"$$REPO_URL\" ]; then echo 'ERROR: REPO_URL is not set. Create .env file with REPO_URL=https://github.com/username/repo.git' && exit 1; fi; BRANCH=$${BRANCH:-master}; echo '🔄 Fetching latest code...'; if [ -d /app/.git ]; then cd /app && git fetch origin && git reset --hard origin/$$BRANCH && echo '✓ Code updated'; else rm -rf /app/* /app/.[!.]* 2>/dev/null || true; git clone --branch $$BRANCH --single-branch $$REPO_URL /app && echo '✓ Code cloned'; fi && echo '📦 Installing dependencies...' && pip install --no-cache-dir -r requirements.txt 2>/dev/null && echo '✓ Dependencies installed' && echo '🚀 Starting server...' && exec uvicorn run:app --host 0.0.0.0 --port 5000 --workers 2 --proxy-headers --forwarded-allow-ips '*' --log-level info"]

  telegram-bot:
    container_name: todo-telegram-bot
    restart: unless-stopped
    build:
      context: ./BACKEND/TELEGRAM
      dockerfile: Dockerfile
    volumes:
      - bot_data:/app/data
      - node_modules:/app/node_modules
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - API_URL=http://web:5000  # Docker override; source of truth: SETTINGS.py
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID:-}
      # BWS secrets loader
      - BITWARDEN_ENABLED=${BITWARDEN_ENABLED:-0}
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN:-}
      - BWS_PROJECT_ID=${BWS_PROJECT_ID:-}
    depends_on:
      web:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "npm install && if [ \"$$BITWARDEN_ENABLED\" = \"1\" ] && [ -n \"$$BWS_ACCESS_TOKEN\" ] && [ -n \"$$BWS_PROJECT_ID\" ]; then echo 'BWS: fetching secrets...'; SECRETS=$$(BWS_ACCESS_TOKEN=$$BWS_ACCESS_TOKEN bws secret list $$BWS_PROJECT_ID 2>/dev/null); if [ -n \"$$SECRETS\" ]; then export TELEGRAM_BOT_TOKEN=$$(echo \"$$SECRETS\" | jq -r '.[] | select(.key==\"TELEGRAM_BOT_TOKEN\") | .value'); export ADMIN_TELEGRAM_ID=$$(echo \"$$SECRETS\" | jq -r '.[] | select(.key==\"ADMIN_TELEGRAM_ID\") | .value'); echo \"BWS: loaded TELEGRAM_BOT_TOKEN, ADMIN_TELEGRAM_ID\"; fi; fi && exec node run.js"]

volumes:
  app_data:
  bot_data:
  pip_cache:
  node_modules:
