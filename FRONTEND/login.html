<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ToDo Game - Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/login.css">
    <style>:root{--accent-primary:{{ accent_primary }};--accent-fire:{{ accent_fire }};}</style>
</head>
<body{% if register_error and register_error != "User already exists" %} data-show-register="1"{% endif %}>
    <div class="login-container">
        <div class="logo">
            <span class="logo-icon">🎯</span>
            <div class="logo-title">ToDo Game</div>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="show('login')" type="button">Login</button>
                <button class="tab" onclick="show('register')" type="button">Register</button>
            </div>

            <div id="login" class="form active">
                {% if error %}<div class="error">{{ error }}</div>{% endif %}
                {% if register_error == "User already exists" %}<div class="error">{{ register_error }}</div>{% endif %}
                <form method="post" action="/login">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="input-group">
                        <label for="login-username">Username</label>
                        <input id="login-username" name="username" type="text" placeholder="Enter username" required autocomplete="username" autofocus>
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input id="login-password" name="password" type="password" placeholder="Enter password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="submit-btn">Start adventure</button>
                </form>
            </div>

            <div id="register" class="form">
                {% if register_error and register_error != "User already exists" %}<div class="error">{{ register_error }}</div>{% endif %}
                <form method="post" action="/register">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="input-group">
                        <label for="register-username">Username</label>
                        <input id="register-username" name="username" type="text" placeholder="Choose a username" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="register-password">Password</label>
                        <input id="register-password" name="password" type="password" placeholder="Choose a password" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="submit-btn">Create account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.body.classList.add('ready');
        function show(id) {
            document.querySelectorAll('.form, .tab').forEach(e => e.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelector(`.tab:nth-child(${id === 'login' ? 1 : 2})`).classList.add('active');
            document.getElementById(id).querySelector('input[type="text"]').focus();
        }
        if (document.body.dataset.showRegister) show('register');
    </script>
</body>
</html>
